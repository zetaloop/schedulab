apiVersion: v1
kind: ServiceAccount
metadata:
  name: schedulab-scheduler
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: schedulab-scheduler
rules:
  - apiGroups: [""]
    resources: ["bindings", "events"]
    verbs: ["create", "patch", "update"]
  - apiGroups: [""]
    resources: ["endpoints", "namespaces", "nodes", "persistentvolumeclaims", "persistentvolumes", "pods", "replicationcontrollers", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/binding", "pods/status"]
    verbs: ["create", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: [""]
    resources: ["pods/finalizers"]
    verbs: ["update"]
  - apiGroups: ["apps"]
    resources: ["replicasets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["scheduling.k8s.io"]
    resources: ["priorityclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["csidrivers", "csinodes", "csistoragecapacities", "storageclasses", "volumeattachments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["resource.k8s.io"]
    resources: ["deviceclasses", "resourceclaims", "resourceslices"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["resource.k8s.io"]
    resources: ["resourceclaims"]
    verbs: ["create", "delete", "patch", "update"]
  - apiGroups: ["resource.k8s.io"]
    resources: ["resourceclaims/status", "resourceclaims/binding"]
    verbs: ["get", "list", "patch", "update", "watch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["create", "get", "list", "update", "watch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leasecandidates"]
    verbs: ["create", "delete", "deletecollection", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["events.k8s.io"]
    resources: ["events"]
    verbs: ["create", "patch", "update"]
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["subjectaccessreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: schedulab-scheduler-auth-reader
  namespace: kube-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: extension-apiserver-authentication-reader
subjects:
  - kind: ServiceAccount
    name: schedulab-scheduler
    namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: schedulab-scheduler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: schedulab-scheduler
subjects:
  - kind: ServiceAccount
    name: schedulab-scheduler
    namespace: kube-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: schedulab-scheduler-config
  namespace: kube-system
data:
  scheduler-config.yaml: |
    apiVersion: kubescheduler.config.k8s.io/v1
    kind: KubeSchedulerConfiguration
    leaderElection:
      leaderElect: false
    profiles:
      - schedulerName: schedulab-scheduler
        plugins:
          preEnqueue:
            disabled:
              - name: DynamicResources
          queueSort:
            disabled:
              - name: "*"
            enabled:
              - name: Schedulab
          preFilter:
            disabled:
              - name: DynamicResources
          filter:
            disabled:
              - name: DynamicResources
            enabled:
              - name: Schedulab
          postFilter:
            disabled:
              - name: DynamicResources
          score:
            disabled:
              - name: DynamicResources
            enabled:
              - name: Schedulab
                weight: 2
          reserve:
            disabled:
              - name: DynamicResources
            enabled:
              - name: Schedulab
          permit:
            enabled:
              - name: Schedulab
          preBind:
            disabled:
              - name: DynamicResources
          bind:
            disabled:
              - name: DefaultBinder
            enabled:
              - name: Schedulab
        pluginConfig:
          - name: Schedulab
            args:
              mode: balanced
              bindPods: true
              maxCPUUtilization: 90
              maxMemoryUtilization: 90
              cpuWeight: 45
              memoryWeight: 35
              spreadWeight: 20
              permitWaitSeconds: 0
              permitTimeoutSeconds: 5
              maxReservationsPerNode: 0
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: schedulab-scheduler
  namespace: kube-system
  labels:
    app: schedulab-scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: schedulab-scheduler
  template:
    metadata:
      labels:
        app: schedulab-scheduler
    spec:
      serviceAccountName: schedulab-scheduler
      containers:
        - name: scheduler
          image: localhost:5001/schedulab-scheduler:latest
          imagePullPolicy: IfNotPresent
          args:
            - --config=/etc/kubernetes/scheduler-config.yaml
            - --v=2
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /etc/kubernetes
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: schedulab-scheduler-config
